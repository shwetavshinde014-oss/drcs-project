<!DOCTYPE html>
<html>
<head>
  <title>DRCS Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f6f8;
    }

    header {
      background: #1e293b;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
    }

    .container {
      padding: 20px;
    }

    .cards {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
    }

    .card {
      flex: 1;
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    .main {
      display: flex;
      gap: 20px;
    }

    .left, .right {
      flex: 1;
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
    }

    button {
      padding: 8px;
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
      width: 100%;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #eee;
      padding: 8px;
      margin: 5px 0;
      border-radius: 5px;
    }

    .map {
      height: 250px;
      background: #cbd5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>

<header>🚨 Disaster Response Coordination System</header>

<div class="container">

  <!-- Stats -->
  <div class="cards">
    <div class="card">
      <h3 id="agencyCount">0</h3>
      <p>Agencies</p>
    </div>
    <div class="card">
      <h3 id="taskCount">0</h3>
      <p>Tasks</p>
    </div>
    <div class="card">
      <h3>Active</h3>
      <p>System Status</p>
    </div>
  </div>

  <!-- Map -->
  <div class="map">
    📍 Live Map (Demo View)
  </div>

  <div class="main">

    <!-- Agencies -->
    <div class="left">
      <h3>Add Agency</h3>

      <input id="name" placeholder="Name">
      <input id="type" placeholder="Type">
      <input id="phone" placeholder="Phone">
      <input id="location" placeholder="Location">

      <button onclick="addAgency()">Add Agency</button>

      <h3>Agencies</h3>
      <ul id="agencies"></ul>
    </div>

    <!-- Tasks -->
    <div class="right">
      <h3>Create Task</h3>

      <input id="taskTitle" placeholder="Task Title">
      <input id="agencyId" placeholder="Agency ID">

      <button onclick="addTask()">Assign Task</button>

      <h3>Tasks</h3>
      <ul id="tasks"></ul>
    </div>

  </div>

</div>

<script>
const API = "http://localhost:3001/api";

// Load Agencies
async function loadAgencies() {
  const res = await fetch(`${API}/agencies`);
  const data = await res.json();

  document.getElementById("agencyCount").innerText = data.length;

  const list = document.getElementById("agencies");
  list.innerHTML = "";

  data.forEach(a => {
    const li = document.createElement("li");
    li.innerText = `ID:${a.id} | ${a.name} - ${a.type}`;
    list.appendChild(li);
  });
}

// Add Agency
async function addAgency() {
  const body = {
    name: name.value,
    type: type.value,
    phone: phone.value,
    location: location.value
  };

  await fetch(`${API}/agencies`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(body)
  });

  loadAgencies();
}

// Load Tasks
async function loadTasks() {
  const res = await fetch(`${API}/tasks`);
  const data = await res.json();

  document.getElementById("taskCount").innerText = data.length;

  const list = document.getElementById("tasks");
  list.innerHTML = "";

  data.forEach(t => {
    const li = document.createElement("li");
    li.innerText = `${t.title} → Agency ${t.assigned_to}`;
    list.appendChild(li);
  });
}

// Add Task
async function addTask() {
  const body = {
    title: taskTitle.value,
    assigned_to: agencyId.value
  };

  await fetch(`${API}/tasks`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(body)
  });

  loadTasks();
}

loadAgencies();
loadTasks();
</script>

</body>
</html>
